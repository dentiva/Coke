<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#E8132B" />
  <title>Coca-Cola · Market Intelligence</title>

  <!-- jsdelivr CDN — load order: React → ReactDOM → PropTypes → Recharts -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #F4F5F7; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
    select, input, button, textarea { font-family: inherit; }
    @keyframes nis-spin { to { transform: rotate(360deg) } }
    @keyframes nis-fade { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }
    .fade-in { animation: nis-fade .25s ease }
    .suggest-btn:hover { border-color: #E8132B !important; color: #E8132B !important; }
    .nav-item:hover { background: #F4F5F7 !important; }
  </style>
</head>
<body>
  <div id="root">
    <div style="padding:40px;text-align:center;color:#9CA3AF;font-family:system-ui">Loading Nielsen RMS Intelligence...</div>
  </div>

  <script>
  window.addEventListener('load', function() {
    'use strict';
    var missing = [];
    if (typeof React === 'undefined') missing.push('React');
    if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
    if (typeof PropTypes === 'undefined') missing.push('PropTypes');
    if (typeof Recharts === 'undefined') missing.push('Recharts');
    if (missing.length) {
      document.getElementById('root').innerHTML =
        '<div style="padding:60px;text-align:center;color:#E8132B;font-family:system-ui;max-width:600px;margin:80px auto">' +
        '<h2 style="margin-bottom:16px">Library load failed</h2>' +
        '<p style="color:#6B7280;margin-bottom:16px">Missing: <code style="background:#FEF2F2;padding:2px 6px;border-radius:4px">' + missing.join(', ') + '</code></p>' +
        '<p style="color:#6B7280;font-size:13px">Press F12 and check the console for network errors.</p></div>';
      return;
    }

    var h = React.createElement, useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, Fragment = React.Fragment, R = Recharts;

    var C = {
      red: '#E8132B', redDark: '#B8000F', redLight: '#FFF0F1',
      white: '#FFFFFF', offWhite: '#FAFAFA', pageBg: '#F4F5F7',
      ink: '#1A1A1A', inkMid: '#3D3D3D', inkLight: '#6B7280', inkFaint: '#9CA3AF',
      border: '#E8EAED',
      green: '#15803D', greenBg: '#DCFCE7',
      amber: '#B45309', amberBg: '#FEF3C7',
      danger: '#DC2626', dangerBg: '#FEE2E2',
      chart1: '#E8132B', chart2: '#1D4ED8', chart3: '#F97316', chart4: '#EC4899', chart5: '#9CA3AF', chart6: '#14B8A6'
    };
    var PIE_COLORS = [C.chart1, C.chart2, C.chart3, C.chart4, C.chart6, C.chart5];

    function apiGet(path, params) {
      var url = new URL('/api' + path, window.location.origin);
      if (params) Object.keys(params).forEach(function(k) { if (params[k] != null) url.searchParams.set(k, params[k]); });
      return fetch(url).then(function(r) { if (!r.ok) throw new Error(r.statusText); return r.json(); });
    }
    function apiPost(path, body) {
      return fetch('/api' + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(function(r) { if (!r.ok) throw new Error(r.statusText); return r.json(); });
    }

    function KpiCard(p) {
      var d = p.delta != null ? p.delta : null;
      var isPos = d !== null && d >= 0;
      var good = d === null ? null : ((p.positiveIsGood !== false) ? isPos : !isPos);
      var dColor = good === null ? C.inkFaint : (good ? C.green : C.danger);
      return h('div', { style: { background: p.accent ? C.red : C.white, borderRadius: 12, padding: '16px 20px', borderTop: '3px solid ' + (p.accent ? C.redDark : C.red), boxShadow: '0 1px 4px rgba(0,0,0,0.07)' }},
        h('div', { style: { fontSize: 10, color: p.accent ? 'rgba(255,255,255,0.75)' : C.inkFaint, fontWeight: 700, letterSpacing: '.07em', textTransform: 'uppercase', marginBottom: 8 }}, p.label),
        h('div', { style: { fontSize: 26, fontWeight: 800, color: p.accent ? C.white : C.ink, lineHeight: 1 }}, p.value != null ? p.value : '—'),
        d !== null && h('div', { style: { fontSize: 12, color: p.accent ? 'rgba(255,255,255,0.85)' : dColor, marginTop: 6, fontWeight: 600 }},
          (isPos ? '▲ ' : '▼ ') + Math.abs(d).toFixed(1) + ' pts vs LY')
      );
    }

    function ChartCard(p) {
      var s = { background: C.white, borderRadius: 12, padding: '18px 20px', boxShadow: '0 1px 4px rgba(0,0,0,0.07)' };
      if (p.style) Object.keys(p.style).forEach(function(k) { s[k] = p.style[k]; });
      return h('div', { style: s },
        p.title && h('div', { style: { fontSize: 12, fontWeight: 700, color: C.inkMid, marginBottom: 14, textTransform: 'uppercase', letterSpacing: '.04em' }}, p.title),
        p.children
      );
    }

    function SevBadge(p) {
      var map = { HIGH: [C.dangerBg, C.danger], MEDIUM: [C.amberBg, C.amber], LOW: [C.greenBg, C.green] };
      var cols = map[p.severity] || ['#F3F4F6', '#6B7280'];
      return h('span', { style: { background: cols[0], color: cols[1], padding: '3px 10px', borderRadius: 4, fontSize: 11, fontWeight: 700, letterSpacing: '.04em' }}, p.severity);
    }

    function DeltaPill(p) {
      if (p.value == null) return h('span', { style: { color: C.inkFaint }}, '—');
      var isPos = p.value >= 0;
      var good = (p.positiveIsGood !== false) ? isPos : !isPos;
      return h('span', { style: { color: good ? C.green : C.danger, fontWeight: 600, fontSize: 12 }}, (isPos ? '▲ ' : '▼ ') + Math.abs(p.value).toFixed(1));
    }

    function Spinner(p) {
      return h('div', { style: { display: 'flex', alignItems: 'center', gap: 12, padding: '40px 0', color: C.inkLight, fontSize: 13 }},
        h('div', { style: { width: 20, height: 20, border: '2px solid ' + C.border, borderTopColor: C.red, borderRadius: '50%', animation: 'nis-spin 0.7s linear infinite' }}),
        p.message || 'Loading...'
      );
    }

    function PageHeader(p) {
      return h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 22 }},
        h('div', null,
          h('h1', { style: { fontSize: 22, fontWeight: 800, color: C.ink, letterSpacing: '-.01em' }}, p.title),
          p.subtitle && h('p', { style: { fontSize: 12, color: C.inkLight, marginTop: 4 }}, p.subtitle)
        ),
        p.right
      );
    }

    function Portfolio(p) {
      var cs = useState(null), cur = cs[0], setCur = cs[1];
      var ls = useState(null), ly = ls[0], setLy = ls[1];
      var os = useState([]), owners = os[0], setOwners = os[1];
      var as = useState([]), anom = as[0], setAnom = as[1];
      var lo = useState(true), loading = lo[0], setLoading = lo[1];
      useEffect(function() {
        if (!p.period) return;
        setLoading(true);
        Promise.all([
          apiGet('/dashboard/portfolio', { period: p.period, zone: p.zone }),
          p.lyPeriod ? apiGet('/dashboard/portfolio', { period: p.lyPeriod, zone: p.zone }) : Promise.resolve(null),
          apiGet('/dashboard/brand-owners', { period: p.period, zone: p.zone }),
          apiGet('/dashboard/anomalies', { current_period: p.period })
        ]).then(function(res) { setCur(res[0]); setLy(res[1]); setOwners(res[2].slice(0, 6)); setAnom(res[3].slice(0, 4)); })
          .catch(function(e) { console.error(e); }).finally(function() { setLoading(false); });
      }, [p.period, p.lyPeriod, p.zone]);
      function d(a, b) { return a != null && b != null ? parseFloat((a - b).toFixed(2)) : null; }
      if (loading) return h(Spinner, { message: 'Loading portfolio...' });

      return h('div', { className: 'fade-in' },
        h(PageHeader, { title: 'Portfolio Overview', subtitle: p.zone + ' · ' + p.period + ' vs ' + (p.lyPeriod || 'LY') + ' · General Trade' }),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 14, marginBottom: 22 }},
          h(KpiCard, { label: 'TCCC MS Value', value: cur && cur.ms_value_pct != null ? cur.ms_value_pct.toFixed(1) + '%' : '—', delta: d(cur && cur.ms_value_pct, ly && ly.ms_value_pct), accent: true }),
          h(KpiCard, { label: 'TCCC MS Volume', value: cur && cur.ms_volume_pct != null ? cur.ms_volume_pct.toFixed(1) + '%' : '—', delta: d(cur && cur.ms_volume_pct, ly && ly.ms_volume_pct) }),
          h(KpiCard, { label: 'Avg WD', value: cur && cur.avg_wd_pct != null ? cur.avg_wd_pct.toFixed(1) + '%' : '—', delta: d(cur && cur.avg_wd_pct, ly && ly.avg_wd_pct) }),
          h(KpiCard, { label: 'SPPD', value: cur && cur.sppd != null ? cur.sppd.toFixed(0) : '—', delta: d(cur && cur.sppd, ly && ly.sppd) }),
          h(KpiCard, { label: 'Replenishment Ratio', value: cur && cur.rr != null ? cur.rr.toFixed(2) : '—', positiveIsGood: false })
        ),
        h('div', { style: { display: 'grid', gridTemplateColumns: '3fr 2fr', gap: 16, marginBottom: 18 }},
          h(ChartCard, { title: 'MS Value — Top Brand Owners (%)' },
            h(R.ResponsiveContainer, { width: '100%', height: 215 },
              h(R.BarChart, { data: owners, barSize: 28 },
                h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, vertical: false }),
                h(R.XAxis, { dataKey: 'brand_owner', tick: { fontSize: 10, fill: C.inkLight }, interval: 0, angle: -12, textAnchor: 'end', height: 44 }),
                h(R.YAxis, { tick: { fontSize: 11, fill: C.inkLight }}),
                h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }, formatter: function(v) { return [v.toFixed(1) + '%', 'MS%']; }}),
                h(R.Bar, { dataKey: 'ms_pct', radius: [5, 5, 0, 0] },
                  owners.map(function(_, i) { return h(R.Cell, { key: i, fill: PIE_COLORS[i] || C.chart5 }); })
                )
              )
            )
          ),
          h(ChartCard, { title: 'Share of Market — ' + p.period },
            h(R.ResponsiveContainer, { width: '100%', height: 215 },
              h(R.PieChart, null,
                h(R.Pie, { data: owners, cx: '50%', cy: '48%', innerRadius: 55, outerRadius: 82, dataKey: 'ms_pct',
                  label: function(e) { return e.ms_pct.toFixed(1) + '%'; }, labelLine: false, paddingAngle: 2 },
                  owners.map(function(_, i) { return h(R.Cell, { key: i, fill: PIE_COLORS[i] || C.chart5 }); })
                ),
                h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }, formatter: function(v) { return v.toFixed(1) + '%'; }}),
                h(R.Legend, { wrapperStyle: { fontSize: 11 }})
              )
            )
          )
        ),
        h(ChartCard, { title: '' },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }},
            h('div', { style: { fontSize: 12, fontWeight: 700, color: C.inkMid, textTransform: 'uppercase', letterSpacing: '.04em' }},
              'Active Anomalies — ' + anom.filter(function(a) { return a.severity === 'HIGH'; }).length + ' High Priority'),
            h('button', { onClick: p.onViewAnomalies, style: { fontSize: 12, color: C.red, background: 'none', border: 'none', cursor: 'pointer', fontWeight: 700 }}, 'View all →')
          ),
          anom.map(function(a, i) {
            return h('div', { key: i,
              style: { display: 'flex', alignItems: 'flex-start', gap: 12, padding: '10px 0', borderBottom: i < anom.length - 1 ? '1px solid ' + C.border : 'none' }
            },
              h(SevBadge, { severity: a.severity }),
              h('div', { style: { flex: 1 }},
                h('div', { style: { fontSize: 13, fontWeight: 700, color: C.ink }},
                  a.type + ' — ', h('span', { style: { color: C.red }}, a.brand), ' · ' + a.zone
                ),
                h('div', { style: { fontSize: 12, color: C.inkLight, marginTop: 2, lineHeight: 1.5 }}, a.description.substring(0, 110) + '...')
              )
            );
          })
        )
      );
    }

    function BrandDive(p) {
      var bs = useState('THUMS UP'), brand = bs[0], setBrand = bs[1];
      var zs = useState('SLMG Total'), zone = zs[0], setZone = zs[1];
      var ds = useState([]), data = ds[0], setData = ds[1];
      var ls = useState(false), loading = ls[0], setLoading = ls[1];
      var ZONES = ['SLMG Total','East UP-1','East UP-2','Central UP','West UP','SLMG Bihar'];
      useEffect(function() {
        if (!brand || !p.periods.length) return;
        setLoading(true);
        apiGet('/dashboard/brand', { brand: brand, periods: p.periods.join(','), zone: zone })
          .then(setData).finally(function() { setLoading(false); });
      }, [brand, zone, p.periods.join(',')]);
      var cur = data[data.length - 1] || {}, prev = data[data.length - 2] || {};
      function d(a, b) { return a != null && b != null ? parseFloat((a - b).toFixed(2)) : null; }
      var kpis = [
        { label: 'MS Value', val: cur.ms_value_pct != null ? cur.ms_value_pct.toFixed(1) + '%' : '—', delta: d(cur.ms_value_pct, prev.ms_value_pct) },
        { label: 'WD%', val: cur.wd_pct != null ? cur.wd_pct.toFixed(1) + '%' : '—', delta: d(cur.wd_pct, prev.wd_pct) },
        { label: 'SPPD', val: cur.sppd != null ? cur.sppd.toFixed(0) : '—', delta: d(cur.sppd, prev.sppd) },
        { label: 'SAH', val: cur.sah != null ? cur.sah.toFixed(3) : '—', delta: d(cur.sah, prev.sah) },
        { label: 'RR', val: cur.rr != null ? cur.rr.toFixed(2) : '—', delta: d(cur.rr, prev.rr), positiveIsGood: false }
      ];
      var selectStyle = { padding: '8px 12px', border: '1px solid ' + C.border, borderRadius: 8, fontSize: 13, color: C.ink, background: C.white, fontWeight: 600, cursor: 'pointer' };

      return h('div', { className: 'fade-in' },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 22 }},
          h(PageHeader, { title: 'Brand Deep Dive', subtitle: '4-period trend · KPI decomposition' }),
          h('div', { style: { display: 'flex', gap: 10, marginTop: 4 }},
            h('select', { value: brand, onChange: function(e) { setBrand(e.target.value); }, style: selectStyle },
              p.brands.map(function(b) { return h('option', { key: b }, b); })
            ),
            h('select', { value: zone, onChange: function(e) { setZone(e.target.value); }, style: Object.assign({}, selectStyle, { fontWeight: 400 }) },
              ZONES.map(function(z) { return h('option', { key: z }, z); })
            )
          )
        ),
        loading ? h(Spinner) : h(Fragment, null,
          h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12, marginBottom: 18 }},
            kpis.map(function(k) {
              return h('div', { key: k.label,
                style: { background: C.white, borderRadius: 12, padding: '14px 18px', borderTop: '3px solid ' + C.border, boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }
              },
                h('div', { style: { fontSize: 10, color: C.inkFaint, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 6 }}, k.label),
                h('div', { style: { fontSize: 22, fontWeight: 800, color: C.ink }}, k.val),
                h('div', { style: { marginTop: 5 }}, h(DeltaPill, { value: k.delta, positiveIsGood: k.positiveIsGood !== false }))
              );
            })
          ),
          h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }},
            h(ChartCard, { title: 'Market Share Value Trend (%)' },
              h(R.ResponsiveContainer, { width: '100%', height: 190 },
                h(R.LineChart, { data: data },
                  h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, vertical: false }),
                  h(R.XAxis, { dataKey: 'period', tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.YAxis, { tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }, formatter: function(v) { return v != null ? v.toFixed(1) + '%' : '—'; }}),
                  h(R.Line, { type: 'monotone', dataKey: 'ms_value_pct', stroke: C.red, strokeWidth: 2.5, dot: { r: 4, fill: C.red, strokeWidth: 2, stroke: C.white }})
                )
              )
            ),
            h(ChartCard, { title: 'WD% — Distribution Quality' },
              h(R.ResponsiveContainer, { width: '100%', height: 190 },
                h(R.BarChart, { data: data, barSize: 28 },
                  h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, vertical: false }),
                  h(R.XAxis, { dataKey: 'period', tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.YAxis, { domain: [0, 100], tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }}),
                  h(R.Bar, { dataKey: 'wd_pct', fill: C.red, radius: [4, 4, 0, 0] })
                )
              )
            ),
            h(ChartCard, { title: 'SPPD — Velocity' },
              h(R.ResponsiveContainer, { width: '100%', height: 190 },
                h(R.LineChart, { data: data },
                  h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, vertical: false }),
                  h(R.XAxis, { dataKey: 'period', tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.YAxis, { tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }}),
                  h(R.Line, { type: 'monotone', dataKey: 'sppd', stroke: C.chart2, strokeWidth: 2.5, dot: { r: 4, fill: C.chart2, stroke: C.white, strokeWidth: 2 }})
                )
              )
            ),
            h(ChartCard, { title: 'Replenishment Ratio (≥0.80 healthy · <0.80 OOS)' },
              h(R.ResponsiveContainer, { width: '100%', height: 190 },
                h(R.LineChart, { data: data },
                  h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, vertical: false }),
                  h(R.XAxis, { dataKey: 'period', tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.YAxis, { domain: [0.5, 1.4], tick: { fontSize: 11, fill: C.inkLight }}),
                  h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }}),
                  h(R.ReferenceLine, { y: 0.80, stroke: C.danger, strokeDasharray: '5 3', label: { value: 'OOS Risk', fill: C.danger, fontSize: 10, position: 'insideTopLeft' }}),
                  h(R.Line, { type: 'monotone', dataKey: 'rr', stroke: C.green, strokeWidth: 2.5, dot: { r: 4, fill: C.green, stroke: C.white, strokeWidth: 2 }})
                )
              )
            )
          )
        )
      );
    }

    function Geography(p) {
      var ds = useState([]), data = ds[0], setData = ds[1];
      var ls = useState(true), loading = ls[0], setLoading = ls[1];
      useEffect(function() {
        if (!p.period) return;
        setLoading(true);
        apiGet('/dashboard/geo', { period: p.period }).then(setData).finally(function() { setLoading(false); });
      }, [p.period]);
      var chartData = data.filter(function(r) { return r.zone !== 'SLMG Total'; });
      if (loading) return h(Spinner);
      return h('div', { className: 'fade-in' },
        h(PageHeader, { title: 'Geography Roll-up', subtitle: 'Zone-level performance · ' + p.period + ' · General Trade' }),
        h(ChartCard, { title: 'TCCC MS Value % by Zone', style: { marginBottom: 18 }},
          h(R.ResponsiveContainer, { width: '100%', height: 230 },
            h(R.BarChart, { data: chartData, layout: 'vertical', barSize: 20 },
              h(R.CartesianGrid, { strokeDasharray: '3 3', stroke: C.border, horizontal: false }),
              h(R.XAxis, { type: 'number', domain: [0, 65], tick: { fontSize: 11, fill: C.inkLight }}),
              h(R.YAxis, { dataKey: 'zone', type: 'category', width: 90, tick: { fontSize: 11, fill: C.inkMid }}),
              h(R.Tooltip, { contentStyle: { background: C.white, border: '1px solid ' + C.border, borderRadius: 8, fontSize: 12 }, formatter: function(v) { return v != null ? v.toFixed(1) + '%' : '—'; }}),
              h(R.Bar, { dataKey: 'ms_value_pct', fill: C.red, radius: [0, 5, 5, 0] })
            )
          )
        ),
        h(ChartCard, { title: 'Zone Scorecard' },
          h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 12 }},
            h('thead', null,
              h('tr', { style: { background: C.red }},
                ['Zone','TCCC MS%','Avg WD%','SPPD','RR','Status'].map(function(th) {
                  return h('th', { key: th, style: { padding: '11px 16px', color: 'rgba(255,255,255,0.92)', fontWeight: 700, textAlign: 'left', fontSize: 11, letterSpacing: '.04em' }}, th);
                })
              )
            ),
            h('tbody', null,
              data.map(function(r, i) {
                var rrOk = r.rr != null && r.rr >= 0.80;
                var msGood = r.ms_value_pct != null && r.ms_value_pct > 53;
                var status = !rrOk ? '● OOS Risk' : msGood ? '● On Track' : '● Watch';
                var sc = !rrOk ? C.danger : msGood ? C.green : C.amber;
                var sbg = !rrOk ? C.dangerBg : msGood ? C.greenBg : C.amberBg;
                return h('tr', { key: r.zone, style: { background: i % 2 === 0 ? C.white : C.offWhite, borderBottom: '1px solid ' + C.border }},
                  h('td', { style: { padding: '11px 16px', fontWeight: r.zone === 'SLMG Total' ? 700 : 400, color: C.ink }}, r.zone),
                  h('td', { style: { padding: '11px 16px', fontWeight: 600, color: msGood ? C.green : (r.ms_value_pct != null && r.ms_value_pct < 52 ? C.danger : C.ink) }}, (r.ms_value_pct != null ? r.ms_value_pct.toFixed(1) : '—') + '%'),
                  h('td', { style: { padding: '11px 16px', color: C.inkMid }}, (r.avg_wd_pct != null ? r.avg_wd_pct.toFixed(1) : '—') + '%'),
                  h('td', { style: { padding: '11px 16px', color: C.inkMid }}, r.sppd != null ? r.sppd.toFixed(0) : '—'),
                  h('td', { style: { padding: '11px 16px', fontWeight: 600, color: rrOk ? C.green : C.danger }}, r.rr != null ? r.rr.toFixed(2) : '—'),
                  h('td', { style: { padding: '11px 16px' }},
                    h('span', { style: { background: sbg, color: sc, padding: '3px 10px', borderRadius: 4, fontSize: 11, fontWeight: 700 }}, status)
                  )
                );
              })
            )
          )
        )
      );
    }

    function Anomalies(p) {
      var ds = useState([]), data = ds[0], setData = ds[1];
      var ls = useState(true), loading = ls[0], setLoading = ls[1];
      useEffect(function() {
        if (!p.period) return;
        setLoading(true);
        apiGet('/dashboard/anomalies', { current_period: p.period }).then(setData).finally(function() { setLoading(false); });
      }, [p.period]);
      if (loading) return h(Spinner);
      var high = data.filter(function(a) { return a.severity === 'HIGH'; });
      var med = data.filter(function(a) { return a.severity === 'MEDIUM'; });
      return h('div', { className: 'fade-in' },
        h(PageHeader, { title: 'Anomaly Detection', subtitle: 'AI white-space scanner · ' + high.length + ' HIGH · ' + med.length + ' MEDIUM · ' + p.period }),
        data.map(function(a, i) {
          var bc = a.severity === 'HIGH' ? C.danger : a.severity === 'MEDIUM' ? C.amber : C.green;
          return h('div', { key: i,
            style: { background: C.white, borderRadius: 12, padding: '18px 22px', marginBottom: 14, borderLeft: '4px solid ' + bc, boxShadow: '0 1px 4px rgba(0,0,0,0.07)' }
          },
            h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, flexWrap: 'wrap' }},
              h(SevBadge, { severity: a.severity }),
              h('span', { style: { fontSize: 14, fontWeight: 800, color: C.ink }}, a.type),
              h('span', { style: { color: C.border }}, '|'),
              h('span', { style: { fontSize: 13, fontWeight: 700, color: C.red }}, a.brand),
              h('span', { style: { color: C.border }}, '|'),
              h('span', { style: { fontSize: 13, color: C.inkMid }}, a.zone),
              h('span', { style: { marginLeft: 'auto', fontSize: 11, color: C.inkFaint, background: C.pageBg, padding: '2px 8px', borderRadius: 4 }}, a.period)
            ),
            h('p', { style: { fontSize: 13, color: C.inkMid, lineHeight: 1.65, marginBottom: 12 }}, a.description),
            h('div', { style: { background: C.greenBg, border: '1px solid ' + C.green + '30', borderRadius: 8, padding: '10px 16px' }},
              h('span', { style: { fontSize: 10, fontWeight: 800, color: C.green, textTransform: 'uppercase', letterSpacing: '.06em' }}, 'Recommended Action  '),
              h('span', { style: { fontSize: 13, color: C.inkMid }}, a.action)
            )
          );
        })
      );
    }

    function Chatbot() {
      var ms = useState([{ role: 'assistant', content: "Hello — I'm the Nielsen RMS AI Analyst for SLMG. I answer questions using only the current report snapshot. Ask me about market share, distribution gaps, anomalies, or competitive dynamics." }]);
      var msgs = ms[0], setMsgs = ms[1];
      var ins = useState(''), input = ins[0], setInput = ins[1];
      var ls = useState(false), loading = ls[0], setLoading = ls[1];
      var ref = useRef(null);
      useEffect(function() { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [msgs]);
      function send() {
        if (!input.trim() || loading) return;
        var q = input.trim(), history = msgs.slice(-10);
        setMsgs(function(prev) { return prev.concat([{ role: 'user', content: q }]); });
        setInput(''); setLoading(true);
        apiPost('/chat', { question: q, history: history })
          .then(function(res) { setMsgs(function(prev) { return prev.concat([{ role: 'assistant', content: res.answer }]); }); })
          .catch(function() { setMsgs(function(prev) { return prev.concat([{ role: 'assistant', content: 'Unable to reach the AI. Check the ANTHROPIC_API_KEY env var in Railway.' }]); }); })
          .finally(function() { setLoading(false); });
      }
      var SUGGESTIONS = ["Why is Thums Up losing share in East UP-2?","Which brands are Hidden Gems this month?","Explain the Campa threat in Central UP","What is Sprite's replenishment risk in Bihar?","What does DQI tell us about Kinley?"];
      return h('div', { className: 'fade-in', style: { display: 'flex', flexDirection: 'column', height: 'calc(100vh - 104px)' }},
        h(PageHeader, { title: 'AI Analyst', subtitle: 'Answers from report data only · TCCC-first · no hallucination' }),
        h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }},
          SUGGESTIONS.map(function(q) {
            return h('button', { key: q, onClick: function() { setInput(q); }, className: 'suggest-btn',
              style: { padding: '6px 13px', background: C.white, border: '1px solid ' + C.border, borderRadius: 20, fontSize: 12, color: C.inkMid, cursor: 'pointer', transition: 'all .12s' }
            }, q);
          })
        ),
        h('div', { ref: ref, style: { flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 14, paddingRight: 4 }},
          msgs.map(function(m, i) {
            return h('div', { key: i, style: { display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }},
              m.role === 'assistant' && h('div', { style: { width: 28, height: 28, borderRadius: '50%', background: C.red, color: C.white, fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginRight: 8, marginTop: 2 }}, 'AI'),
              h('div', {
                style: {
                  maxWidth: '76%', padding: '11px 16px', fontSize: 13, lineHeight: 1.65, borderRadius: 12,
                  background: m.role === 'user' ? C.red : C.white,
                  color: m.role === 'user' ? C.white : C.ink,
                  boxShadow: m.role === 'assistant' ? '0 1px 3px rgba(0,0,0,0.07)' : 'none',
                  borderBottomRightRadius: m.role === 'user' ? 3 : 12,
                  borderBottomLeftRadius: m.role === 'assistant' ? 3 : 12,
                  whiteSpace: 'pre-wrap'
                }
              }, m.content)
            );
          }),
          loading && h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 }},
            h('div', { style: { width: 28, height: 28, borderRadius: '50%', background: C.red, color: C.white, fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center' }}, 'AI'),
            h('div', { style: { background: C.white, borderRadius: 12, borderBottomLeftRadius: 3, padding: '11px 16px', fontSize: 13, color: C.inkFaint, boxShadow: '0 1px 3px rgba(0,0,0,0.07)' }}, 'Analysing report data...')
          )
        ),
        h('div', { style: { display: 'flex', gap: 10 }},
          h('input', { value: input, onChange: function(e) { setInput(e.target.value); },
            onKeyDown: function(e) { if (e.key === 'Enter') send(); },
            placeholder: 'Ask about market share, distribution, anomalies, competitive trends...',
            style: { flex: 1, padding: '12px 16px', border: '1px solid ' + C.border, borderRadius: 10, fontSize: 13, color: C.ink, outline: 'none', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }
          }),
          h('button', { onClick: send, disabled: loading,
            style: { padding: '12px 24px', background: loading ? C.inkFaint : C.red, color: C.white, border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: loading ? 'default' : 'pointer' }
          }, 'Send')
        )
      );
    }

    var NAV = [
      { id: 'portfolio', label: 'Portfolio',  icon: '◈' },
      { id: 'brand',     label: 'Brand Dive', icon: '◎' },
      { id: 'geo',       label: 'Geography',  icon: '◉' },
      { id: 'anomalies', label: 'Anomalies',  icon: '◆' },
      { id: 'chat',      label: 'AI Analyst', icon: '◇' }
    ];

    function App() {
      var vs = useState('portfolio'), view = vs[0], setView = vs[1];
      var ps = useState([]), periods = ps[0], setPeriods = ps[1];
      var bs = useState([]), brands = bs[0], setBrands = bs[1];
      var pe = useState(''), period = pe[0], setPeriod = pe[1];
      var ly = useState(''), lyPeriod = ly[0], setLyPeriod = ly[1];
      var ac = useState(0), anomalyCount = ac[0], setAnomalyCount = ac[1];

      useEffect(function() {
        Promise.all([apiGet('/meta/periods'), apiGet('/meta/brands', { tccc_only: true })])
          .then(function(res) {
            var labels = res[0].map(function(x) { return x.period_label; });
            var monthly = labels.filter(function(l) { return l.indexOf('YTD') === -1; });
            setPeriods(labels); setBrands(res[1]);
            if (monthly.length >= 2) {
              setPeriod(monthly[monthly.length - 1]);
              setLyPeriod(monthly[monthly.length - 3] || monthly[0]);
            }
          }).catch(function(e) { console.error('Init:', e); });
      }, []);

      useEffect(function() {
        if (period) {
          apiGet('/dashboard/anomalies', { current_period: period })
            .then(function(a) { setAnomalyCount(a.filter(function(x) { return x.severity === 'HIGH'; }).length); })
            .catch(function() {});
        }
      }, [period]);

      return h('div', { style: { display: 'flex', minHeight: '100vh', background: C.pageBg }},
        h('aside', { style: { width: 215, flexShrink: 0, background: C.white, borderRight: '1px solid ' + C.border, display: 'flex', flexDirection: 'column', position: 'sticky', top: 0, height: '100vh', overflow: 'hidden' }},
          h('div', { style: { background: C.red, padding: '20px 20px 18px', position: 'relative', overflow: 'hidden' }},
            h('div', { style: { position: 'absolute', right: -30, top: -30, width: 100, height: 100, borderRadius: '50%', background: 'rgba(255,255,255,0.08)' }}),
            h('div', { style: { position: 'absolute', right: 10, bottom: -40, width: 80, height: 80, borderRadius: '50%', background: 'rgba(255,255,255,0.06)' }}),
            h('div', { style: { position: 'relative' }},
              h('div', { style: { fontSize: 18, fontWeight: 900, color: C.white, letterSpacing: '-.02em', lineHeight: 1 }}, 'Coca-Cola'),
              h('div', { style: { fontSize: 10, color: 'rgba(255,255,255,0.8)', marginTop: 3, fontWeight: 500, letterSpacing: '.04em' }}, 'NIELSEN RMS INTELLIGENCE'),
              h('div', { style: { marginTop: 10, display: 'inline-block', background: 'rgba(255,255,255,0.2)', padding: '3px 8px', borderRadius: 4, fontSize: 9, color: C.white, fontWeight: 700, letterSpacing: '.06em' }}, 'SLMG PVT. LTD.')
            )
          ),
          periods.length > 0 && h('div', { style: { padding: '12px 16px', borderBottom: '1px solid ' + C.border }},
            h('label', { style: { fontSize: 9, color: C.inkFaint, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 5 }}, 'Current Period'),
            h('select', { value: period, onChange: function(e) { setPeriod(e.target.value); },
              style: { width: '100%', padding: '6px 10px', border: '1px solid ' + C.border, borderRadius: 6, fontSize: 12, color: C.ink, background: C.offWhite, fontWeight: 600 }
            }, periods.filter(function(p) { return p.indexOf('YTD') === -1; }).map(function(p) { return h('option', { key: p }, p); }))
          ),
          h('nav', { style: { flex: 1, padding: '8px 0' }},
            NAV.map(function(item) {
              var active = view === item.id;
              return h('button', { key: item.id, onClick: function() { setView(item.id); }, className: 'nav-item',
                style: {
                  width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px',
                  background: active ? C.redLight : 'transparent',
                  borderLeft: '3px solid ' + (active ? C.red : 'transparent'),
                  color: active ? C.red : C.inkLight,
                  fontSize: 13, fontWeight: active ? 700 : 400, transition: 'all .12s'
                }
              },
                h('span', { style: { fontSize: 14, opacity: active ? 1 : 0.6 }}, item.icon),
                h('span', { style: { flex: 1 }}, item.label),
                item.id === 'anomalies' && anomalyCount > 0 && h('span', {
                  style: { background: C.red, color: C.white, borderRadius: 10, padding: '1px 7px', fontSize: 10, fontWeight: 700 }
                }, anomalyCount)
              );
            })
          ),
          h('div', { style: { padding: '14px 20px', borderTop: '1px solid ' + C.border }},
            h('div', { style: { display: 'inline-block', marginBottom: 6, padding: '2px 7px', background: C.redLight, color: C.red, fontSize: 9, fontWeight: 700, borderRadius: 4, letterSpacing: '.05em' }}, 'DEMO'),
            h('div', { style: { fontSize: 9, color: C.inkFaint, lineHeight: 1.7 }}, 'Synthetic SLMG data · GT only', h('br'), 'Altius Soft Concept Demonstrator')
          )
        ),
        h('main', { style: { flex: 1, overflow: 'auto', padding: '28px 32px' }},
          view === 'portfolio' && h(Portfolio, { period: period, lyPeriod: lyPeriod, zone: 'SLMG Total', onViewAnomalies: function() { setView('anomalies'); }}),
          view === 'brand'     && h(BrandDive, { periods: periods.filter(function(p) { return p.indexOf('YTD') === -1; }), brands: brands }),
          view === 'geo'       && h(Geography, { period: period }),
          view === 'anomalies' && h(Anomalies, { period: period }),
          view === 'chat'      && h(Chatbot)
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  });
  </script>
</body>
</html>
